<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Curriculum — Lessons</title>
    <meta
      name="description"
      content="A from-scratch ML-to-LLM curriculum: the lesson readings, from MSE to a small GPT."
    />
    <!-- Minimal Docsify theme (just layout: sidebar, content, mobile toggle). -->
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/pure.css"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <style>
      /* Match the main curriculum site: GitHub-flat, system fonts, blue accent. */
      :root {
        --theme-color: #0969da;
        --border: #d8dee4;
      }
      body,
      .sidebar,
      .markdown-section {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2328;
      }
      .sidebar {
        border-right: 1px solid var(--border);
      }
      .sidebar-nav strong {
        color: #57606a;
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 0.02em;
      }
      .sidebar a {
        color: #0969da;
      }
      .markdown-section {
        max-width: 56rem;
      }
      .markdown-section a {
        color: #0969da;
      }
      .markdown-section pre,
      .markdown-section code {
        background: #f6f8fa;
      }
      /* Flatten the search box to a plain bordered input. */
      .search {
        border-bottom: 1px solid var(--border);
      }
      .search .input-wrap input {
        border: 1px solid var(--border);
        border-radius: 6px;
        box-shadow: none;
      }
      .search p.empty {
        color: #57606a;
      }
    </style>
  </head>
  <body>
    <div id="app">Loading the curriculum…</div>
    <script>
      window.$docsify = {
        name: "LLM Curriculum",
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
        relativePath: false,
        search: {
          placeholder: "Search the lessons…",
          noData: "No matches.",
          depth: 3,
        },
      };
    </script>
    <!-- Docsify core + search (mobile sidebar toggle ships with the theme) -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <!-- KaTeX math ($…$ inline, $$…$$ display) -->
    <script src="//cdn.jsdelivr.net/npm/marked@4"></script>
    <script src="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
    <!-- Code syntax highlighting -->
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  </body>
</html>
